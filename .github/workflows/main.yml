name: Update Weather Data

on:
  schedule:
    # Τρέχει στις :17, :32, :47 και :02 κάθε ώρα
    - cron: '17,32,47,02 * * * *'
  workflow_dispatch: # Σου επιτρέπει να το ξεκινάς χειροκίνητα

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow beautifulsoup4

      - name: Run weather script
        run: python kairos.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Προσθέτει τα αρχεία. Αν κάποιο λείπει, δεν βγάζει σφάλμα (|| true)
          git add data.json || true
          git add weather_output.png || true
          
          # Ελέγχει αν όντως άλλαξε κάτι πριν κάνει commit
          if git diff --quiet && git diff --staged --quiet; then
            echo "Δεν υπάρχουν αλλαγές στα δεδομένα."
          else
            git commit -m "Ανανέωση καιρού: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
